server {
    listen 80;
    server_name example.com www.example.com;

    # Redirect ke HTTPS (uncomment jika sudah punya SSL)
    # return 301 https://$server_name$request_uri;

    root /var/www/tugasatippitra;
    index index.php;

    # Logging
    access_log /var/log/nginx/tugasatippitra_access.log;
    error_log /var/log/nginx/tugasatippitra_error.log;

    # Security headers
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Prevent direct access ke config files
    location ~ (config\.php|auth_check\.php|database\.sql) {
        deny all;
        return 404;
    }

    # Prevent access ke hidden files
    location ~ /\. {
        deny all;
        return 404;
    }

    # Static files
    location ~* \.(jpg|jpeg|png|gif|css|js|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # PHP files
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_intercept_errors on;
    }

    # Deny access ke undefined files/folders (except index.php)
    location / {
        try_files $uri $uri/ =404;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;
    gzip_min_length 1000;
}

